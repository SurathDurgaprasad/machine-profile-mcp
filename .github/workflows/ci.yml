name: MachineProfile MCP CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install .[develop]

    - name: Lint check with black
      run: |
        black --check .

    - name: Lint check with flake8
      run: |
        flake8 windows_diagnostics_mcp --count --show-source --statistics

    - name: Run unit tests with pytest
      run: |
        pytest windows_diagnostics_mcp/tests/test_diagnostics.py -v

    - name: Run E2E Protocol Validation
      run: |
        python -m windows_diagnostics_mcp.tests.e2e_mcp_test
